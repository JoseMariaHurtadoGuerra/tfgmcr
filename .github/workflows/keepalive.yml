name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          BASE="https://calculodetrazasycontracciones1.streamlit.app"
          for endpoint in "/_stcore/health" "/"; do
            URL="${BASE}${endpoint}"
            echo "Pinging $URL"
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            echo "HTTP $CODE"
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
              exit 0
            fi
          done
          exit 1
