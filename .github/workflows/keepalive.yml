name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          URL="https://calculodetrazasycontracciones1.streamlit.app/"
          echo "Pinging $URL"
          curl -L -sS --max-time 20 --retry 3 --retry-delay 5 "$URL" -o /dev/null -w "HTTP %{http_code}\n"
